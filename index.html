<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nuestra Historia</title>
        <!-- Usamos Tailwind CSS para estilos rápidos y modernos -->
        <script src="https://cdn.tailwindcss.com"></script>
        <!-- Fuente bonita para las cartas -->
        <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
        <!-- Iconos de Lucide (versión fija para evitar breaking changes) -->
        <script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js"></script>

        <link rel="stylesheet" href="style.css" />
    </head>
    <body class="min-h-screen relative text-gray-800">

        <!-- FONDO DE LLUVIA -->
        <div id="background-effects"></div>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="relative z-10 container mx-auto px-4 py-12 flex flex-col items-center">

            <!-- Título Principal -->
            <header class="text-center mb-12">
                <h1 class="text-5xl md:text-6xl font-bold text-rose-600 mb-4" style="font-family: 'Dancing Script', cursive;">
                    Nuestra Historia
                </h1>
                <p class="text-lg text-rose-400 font-semibold">Cada momento cuenta...</p>
            </header>

            <!-- GRID DE HITOS (Aquí se generan los iconos 0.6, 1.0, etc) -->
            <div id="timeline-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-w-4xl">
                <!-- Se llena con Javascript -->
            </div>

            <!-- NUEVA SECCIÓN: GALERÍA DE FOTOS -->
            <div class="mt-16 w-full max-w-4xl">
                <h2 class="text-3xl font-bold text-center text-rose-600 mb-8" style="font-family: 'Dancing Script', cursive;">
                    Nuestros Recuerdos
                </h2>
                <div class="photo-filter-wrap">
                    <div class="photo-filter-controls">
                        <button id="photo-filter-toggle" class="photo-filter-toggle" type="button">
                            <i data-lucide="sliders" class="w-4 h-4"></i>
                            <span>Filtrar</span>
                        </button>
                        <button id="random-photo-btn" class="random-photo-btn" type="button">
                            <i data-lucide="shuffle" class="w-4 h-4"></i>
                            <span>Momento Random</span>
                        </button>
                    </div>
                    <div id="photo-filter-panel" class="photo-filter-panel hidden">
                        <button class="photo-filter-btn" data-filter="day" type="button">Día</button>
                        <button class="photo-filter-btn" data-filter="week" type="button">Semana</button>
                        <button class="photo-filter-btn" data-filter="month" type="button">Mes</button>
                        <button class="photo-filter-btn" data-filter="year" type="button">Año</button>
                        <button class="photo-filter-btn is-reset" data-filter="all" type="button">Todo</button>
                    </div>
                    <div id="photo-filter-popup" class="photo-filter-popup hidden">
                        <div class="photo-filter-popup-head">
                            <span id="photo-filter-title">Seleccionar</span>
                            <button id="photo-filter-close" type="button" class="photo-filter-close">✕</button>
                        </div>
                        <div class="photo-filter-popup-body">
                            <input id="photo-filter-day" type="date" class="photo-filter-input hidden" />
                            <input id="photo-filter-week" type="week" class="photo-filter-input hidden" />
                            <input id="photo-filter-month" type="month" class="photo-filter-input hidden" />
                            <input id="photo-filter-year" type="number" min="1900" max="2100" placeholder="2025" class="photo-filter-input hidden" />
                        </div>
                        <div class="photo-filter-popup-actions">
                            <button id="photo-filter-apply" type="button" class="photo-filter-apply">Aplicar</button>
                        </div>
                    </div>
                </div>
                <div id="photo-gallery" class="photo-grid">
                    <!-- Se llena con Javascript -->
                </div>

                <!-- Estado vacío: aparece cuando el filtro no devuelve resultados -->
                <p id="gallery-empty" class="gallery-empty hidden">
                    No hay fotos para este período 🌸
                </p>

                <!-- Paginación: aparece cuando quedan fotos por mostrar -->
                <div id="load-more-wrap" class="load-more-wrap hidden">
                    <button id="load-more-btn" class="load-more-btn" type="button">
                        <i data-lucide="chevrons-down" class="w-4 h-4"></i>
                        Mostrar más
                    </button>
                </div>
            </div>

            <!-- MENSAJE FINAL / INFINITO -->
            <div class="mt-16 text-center opacity-80">
                <p class="text-sm text-gray-500">Hecho con ❤️ para ti</p>
            </div>
        </div>

        <!-- MODAL (CARTA) - Oculto por defecto -->
        <div id="letter-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity duration-300">
            <div class="letter-paper w-full max-w-lg p-8 rounded-lg relative transform transition-all modal-enter max-h-[90vh] overflow-y-auto">

                <!-- Botón Cerrar -->
                <button onclick="closeModal()" class="absolute top-2 right-2 text-gray-400 hover:text-rose-500 transition-colors">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>

                <!-- Contenido de la Carta -->
                <div class="text-center mb-6">
                    <i data-lucide="heart" class="w-8 h-8 text-rose-500 mx-auto fill-current"></i>
                    <h2 id="modal-title" class="text-3xl font-bold text-rose-600 mt-2">Título</h2>
                </div>

                <div id="modal-content" class="text-left">
                    <!-- El texto de la carta va aquí -->
                </div>

                <div class="mt-8 text-center">
                    <p class="text-sm font-sans text-gray-400">De rata a sapa</p>
                </div>
            </div>
        </div>

        <!-- MODAL (FOTO) - Oculto por defecto -->
        <div id="photo-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity duration-300">
            <div class="photo-modal-card w-full max-w-3xl rounded-2xl relative overflow-hidden bg-white/90 shadow-xl">

                <!-- Botón Cerrar -->
                <button onclick="closePhotoModal()" class="absolute top-3 right-3 z-10 text-gray-400 hover:text-rose-500 transition-colors">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>

                <div class="photo-modal-header">
                    <span id="photo-modal-date" class="photo-modal-date">Fecha</span>
                </div>

                <div class="photo-modal-content">
                    <div class="photo-modal-media">
                        <img id="photo-modal-img" class="photo-modal-img" alt="Foto" />
                    </div>
                    <div class="photo-modal-desc">
                        <p id="photo-modal-desc"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTÓN flotante: explicación de iconos -->
        <button id="icon-explain-btn" onclick="openIconModal()" aria-label="Explicación iconos" data-tooltip="Explicación iconos">
            <i data-lucide="sparkles" class="w-6 h-6"></i>
        </button>

        <!-- MODAL (GALERÍA DE ICONOS) - Oculto por defecto -->
        <div id="icon-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity duration-300" onclick="closeIconModal()">
            <div class="icon-gallery-card-wrap w-full max-w-2xl rounded-2xl relative bg-white/95 shadow-xl max-h-[90vh] overflow-y-auto modal-enter" onclick="event.stopPropagation()">
                <button onclick="closeIconModal()" class="absolute top-3 right-3 z-10 text-gray-400 hover:text-rose-500 transition-colors">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
                <div class="text-center pt-8 pb-2 px-6">
                    <i data-lucide="heart" class="w-8 h-8 text-rose-500 mx-auto fill-current"></i>
                    <h2 class="text-3xl font-bold text-rose-600 mt-2" style="font-family: 'Dancing Script', cursive;">Nuestros iconos</h2>
                    <p class="text-sm text-gray-400">Cada uno guarda un recuerdo</p>
                </div>
                <div id="icon-gallery-grid" class="icon-gallery-grid"></div>
            </div>
        </div>
    </body>

    <!-- ======================================================== -->
    <!-- LOCK SCREEN — se oculta automáticamente al responder bien -->
    <!-- ======================================================== -->
    <div id="lock-screen" aria-live="polite">

        <!-- Lluvia de fondo también aquí -->
        <div id="lock-background-effects"></div>

        <div id="lock-card">

            <!-- Icono y título -->
            <div id="lock-header">
                <i data-lucide="heart-handshake" id="lock-icon"></i>
                <h1 id="lock-title">Nuestra Historia</h1>
                <p id="lock-subtitle">¿Eres tú, mi amor? Demuéstralo 💌</p>
            </div>

            <!-- Contenedor de pregunta (se reemplaza con animación) -->
            <div id="lock-question-wrap">
                <p id="lock-question"></p>
            </div>

            <!-- Opciones -->
            <div id="lock-options"></div>

            <!-- Feedback -->
            <p id="lock-feedback"></p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</html>
